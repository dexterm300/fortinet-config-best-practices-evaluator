# =============================================================================
# FORTIOS 8.0 TESTING CONFIGURATION (CONTAINS INTENTIONAL FLAWS)
# =============================================================================

# --- 1. SYSTEM GLOBAL (FLAWED) ---
config system global
    set hostname "Vulnerable-FW-Test"
    set admin-maintainer enable          # FLAW: Allows password reset via console (CIS violation)
    set admin-lockout-threshold 0        # FLAW: No lockout threshold (Brute-force vulnerable)
    set admin-ssh-v1 enable              # FLAW: SSHv1 is insecure (CIS violation)
    set admintimeout 480                 # FLAW: Timeout is 8 hours (Too long)
    set pre-login-banner disable         # FLAW: Missing legal warning
end

# --- 2. PASSWORD POLICY (FLAWED) ---
config system password-policy
    set status disable                   # FLAW: No password complexity requirements
end

# --- 3. ADMINISTRATIVE ACCESS (FLAWED) ---
config system admin
    edit "admin"
        # FLAW: Missing trusthost (Accessible from any IP)
        set password "123456" 
    next
end

# --- 4. NETWORK INTERFACES (FLAWED) ---
config system interface
    edit "wan1"
        set alias "Internet"
        set mode static
        set ip 203.0.113.10 255.255.255.0
        set allowaccess ping http telnet # FLAW: Management (HTTP/Telnet) open on WAN
    next
    edit "port2"
        set alias "Web_Tier"
        set ip 10.10.10.1 255.255.255.0
    next
    edit "port3"
        set alias "App_Tier"
        set ip 10.10.20.1 255.255.255.0
    next
    edit "port4"
        set alias "DB_Tier"
        set ip 10.10.30.1 255.255.255.0
    next
end

# --- 5. FIREWALL OBJECTS ---
config firewall address
    edit "Web_Servers"
        set subnet 10.10.10.0 255.255.255.0
    next
    edit "App_Servers"
        set subnet 10.10.20.0 255.255.255.0
    next
    edit "DB_Servers"
        set subnet 10.10.30.0 255.255.255.0
    next
end

config firewall vip
    edit "VIP_Web_External"
        set extip 203.0.113.100
        set mappedip "10.10.10.10"
        set extintf "wan1"
    next
end

# --- 6. FIREWALL POLICIES (FLAWED) ---
config firewall policy
    edit 1
        set name "WAN_to_Web"
        set srcintf "wan1"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "VIP_Web_External"
        set action accept
        set schedule "always"
        set service "ALL"                # FLAW: "ALL" services allowed on DMZ (Over-permissive)
        set logtraffic disable           # FLAW: Logging disabled on edge policy
    next
    edit 2
        set name "Web_to_App"
        set srcintf "port2"
        set dstintf "port3"
        set srcaddr "all"                # FLAW: "all" instead of Web_Servers subnet
        set dstaddr "App_Servers"
        set action accept
        set service "ALL"                # FLAW: No specific port/protocol restriction
        set logtraffic all
    next
    edit 3
        set name "App_to_DB"
        set srcintf "port3"
        set dstintf "port4"
        set srcaddr "App_Servers"
        set dstaddr "all"                # FLAW: Destination is "all" (Lateral movement risk)
        set action accept
        set service "MYSQL"
        set logtraffic all
    next
end

# --- 7. LOGGING (FLAWED) ---
config log setting
    set fwpolicy-implicit-deny disable    # FLAW: Denied traffic is not logged (CIS violation)
end

# --- 8. STATIC ROUTING ---
config router static
    edit 1
        set gateway 203.0.113.1
        set device "wan1"
    next
end